<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="theme-color" content="#0d1b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ШейкерКвиз">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>ШейкерКвиз 🌍</title>
<style>
:root {
  --sat: env(safe-area-inset-top,    0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left,   0px);
  --sar: env(safe-area-inset-right,  0px);
  --gold:  #ffd200;
  --green: #4dffb0;
  --red:   #ff6b6b;
  --blue:  #aad4f5;
  --bg1:   #0d1b2a;
  --bg2:   #1a3a5c;
  --card:  rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.13);
  --sub:   rgba(255,255,255,0.55);
  --r: 18px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%;
  overflow:hidden;
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  font-family:-apple-system,'Nunito',system-ui,sans-serif;
  color:#fff;
  overscroll-behavior:none;
  -webkit-user-select:none;
  user-select:none;
}

/* ── APP SHELL ─────────────────────────────── */
.app{
  display:flex;
  flex-direction:column;
  height:100%;
  height:100dvh;
  padding:
    calc(14px + var(--sat))
    max(14px, var(--sar))
    calc(14px + var(--sab))
    max(14px, var(--sal));
  gap:10px;
  overflow:hidden;
}

/* ── INSTALL BANNER ────────────────────────── */
.banner{
  display:none;
  background:rgba(255,210,0,.1);
  border:1px solid rgba(255,210,0,.25);
  border-radius:14px;
  padding:9px 12px;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.banner.on{display:flex;animation:fadein .3s ease;}
.banner p{font-size:.78rem;font-weight:700;color:var(--gold);flex:1;line-height:1.3;}
.banner .ibtn{
  background:var(--gold);border:none;border-radius:9px;
  padding:6px 12px;font-size:.78rem;font-weight:900;
  font-family:inherit;color:#0d1b2a;cursor:pointer;white-space:nowrap;
}
.banner .xbtn{background:none;border:none;color:var(--sub);font-size:1.1rem;cursor:pointer;padding:2px 6px;}

/* ── HEADER ────────────────────────────────── */
.header{
  display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
.logo{font-size:1.25rem;font-weight:900;letter-spacing:.4px;}
.logo span{color:var(--gold);}

.pring{position:relative;width:42px;height:42px;flex-shrink:0;}
.pring svg{width:100%;height:100%;transform:rotate(-90deg);}
.pring circle{fill:none;stroke-width:3;stroke-linecap:round;}
.pring .tr{stroke:rgba(255,255,255,.1);}
.pring .fi{stroke:var(--gold);transition:stroke-dashoffset .5s ease;}
.pring-lbl{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:900;color:var(--gold);
}

/* ── SCORES ────────────────────────────────── */
.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex-shrink:0;}
.sc{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:7px 4px;text-align:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.sc .v{font-size:1.35rem;font-weight:900;line-height:1;}
.sc .l{font-size:.6rem;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-top:2px;}
.sc.c .v{color:var(--green);}
.sc.w .v{color:var(--red);}
.sc.s .v{color:var(--gold);}

/* ── SHAKER ZONE ───────────────────────────── */
.zone{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;position:relative;overflow:hidden;
}
.hint{font-size:.78rem;color:var(--sub);font-weight:600;text-align:center;}

.cup-wrap{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ring{
  position:absolute;
  width:120%;height:120%;
  border-radius:50%;
  border:2.5px solid rgba(255,210,0,.45);
  opacity:0;pointer-events:none;
}
.ring.pulse{animation:ringout .55s ease-out forwards;}
@keyframes ringout{0%{transform:scale(.75);opacity:.9}100%{transform:scale(1.7);opacity:0}}

.cup{
  font-size:clamp(72px,20vw,112px);
  display:block;line-height:1;
  filter:drop-shadow(0 0 22px rgba(255,210,0,.4));
  animation:afloat 3.5s ease-in-out infinite;
}
@keyframes afloat{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-12px) rotate(4deg);}
}
@keyframes bigshake{
  0%  {transform:rotate(0deg)   translateY(0)     scale(1);}
  12% {transform:rotate(-22deg) translateY(-10px) scale(1.06);}
  28% {transform:rotate(22deg)  translateY(-18px) scale(1.12);}
  44% {transform:rotate(-17deg) translateY(-9px)  scale(1.06);}
  58% {transform:rotate(17deg)  translateY(-13px) scale(1.09);}
  72% {transform:rotate(-11deg) translateY(-5px)  scale(1.02);}
  86% {transform:rotate(7deg)   translateY(-2px)  scale(1);}
  100%{transform:rotate(0deg)   translateY(0)     scale(1);}
}
.cup.sh{
  animation:bigshake .78s cubic-bezier(.36,.07,.19,.97) forwards;
  filter:drop-shadow(0 0 40px rgba(255,210,0,.9));
}

/* ── CARD ──────────────────────────────────── */
.card-wrap{
  flex:0 0 auto;max-height:52vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;scrollbar-width:none;
}
.card-wrap::-webkit-scrollbar{display:none;}

.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
@keyframes cardin{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.card.new{animation:cardin .35s ease;}

.empty{text-align:center;padding:22px 12px;color:var(--sub);font-size:.9rem;font-weight:600;line-height:1.6;}
.empty .big{font-size:2.2rem;margin-bottom:6px;}

.qmeta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
.ctag{
  background:rgba(255,209,0,.15);border:1px solid rgba(255,209,0,.3);
  color:var(--gold);font-size:.68rem;font-weight:800;
  padding:3px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dtag{font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.easy  {background:rgba(77,255,176,.14);color:var(--green);border:1px solid rgba(77,255,176,.3);}
.medium{background:rgba(255,200,50,.14);color:#ffc832;    border:1px solid rgba(255,200,50,.3);}
.hard  {background:rgba(255,107,107,.14);color:var(--red); border:1px solid rgba(255,107,107,.3);}

.qtext{
  font-size:clamp(.92rem,3.2vw,1.05rem);font-weight:700;
  line-height:1.45;margin-bottom:14px;color:#fff;
}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{
  padding:12px 9px;font-size:.86rem;font-weight:700;font-family:inherit;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);
  border-radius:12px;color:#ddeeff;cursor:pointer;
  text-align:left;line-height:1.3;
  transition:background .15s,border-color .15s,transform .1s;
  min-height:50px;display:flex;align-items:center;
}
.opt:active:not(:disabled){transform:scale(.97);}
.opt.ok{background:rgba(77,255,176,.2);border-color:var(--green);color:var(--green);animation:popin .3s ease;}
.opt.no{background:rgba(255,107,107,.15);border-color:var(--red);color:#ff9f9f;animation:wrongsh .3s ease;}
@keyframes popin{0%{transform:scale(.96)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes wrongsh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.opt:disabled{cursor:default;}

.fb{margin-top:11px;padding:11px 13px;border-radius:12px;font-size:.82rem;font-weight:700;line-height:1.4;display:none;}
.fb.on{display:block;animation:fadein .3s ease;}
.fb.ok{background:rgba(77,255,176,.11);border:1px solid rgba(77,255,176,.32);color:var(--green);}
.fb.no{background:rgba(255,107,107,.09);border:1px solid rgba(255,107,107,.28);color:#ffaaaa;}

/* ── MAIN BUTTON ───────────────────────────── */
.mbtn{
  width:100%;padding:15px;font-size:.98rem;font-weight:900;font-family:inherit;
  background:linear-gradient(135deg,#f7971e,var(--gold));
  border:none;border-radius:16px;color:#0d1b2a;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,210,0,.32);
  transition:transform .1s,box-shadow .1s,opacity .2s;
  letter-spacing:.3px;flex-shrink:0;
}
.mbtn:active{transform:scale(.98);box-shadow:0 2px 10px rgba(255,210,0,.25);}
.mbtn:disabled{opacity:.45;}

/* ── STREAK BADGE ──────────────────────────── */
.sbadge{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#f7971e,var(--gold));
  color:#0d1b2a;font-size:1.05rem;font-weight:900;
  padding:13px 26px;border-radius:50px;z-index:50;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 28px rgba(255,210,0,.5);
}
.sbadge.pop{animation:sbpop 1.6s ease forwards;}
@keyframes sbpop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  20%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}
  35%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  80%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(.8);opacity:0;}
}

/* ── OVERLAY / RESULTS ─────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:100;align-items:flex-end;justify-content:center;
  padding:0 16px calc(20px + var(--sab));
}
.overlay.on{display:flex;animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}

.rsheet{
  background:linear-gradient(160deg,#1a2d42,#0d1b2a);
  border:1px solid rgba(255,255,255,.17);
  border-radius:26px 26px 20px 20px;
  padding:30px 22px 26px;
  width:100%;max-width:430px;text-align:center;
  animation:slideup .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideup{from{transform:translateY(90px);opacity:0}to{transform:none;opacity:1}}
.rsheet .re{font-size:3.2rem;margin-bottom:8px;}
.rsheet .rt{font-size:1.45rem;font-weight:900;margin-bottom:4px;}
.rsheet .rs{font-size:.82rem;color:var(--sub);margin-bottom:22px;}
.rstats{display:flex;justify-content:center;gap:22px;margin-bottom:26px;}
.rstat .rv{font-size:2rem;font-weight:900;color:var(--gold);}
.rstat .rl{font-size:.62rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.rbtn{
  width:100%;padding:15px;font-size:.98rem;font-weight:900;font-family:inherit;
  background:linear-gradient(135deg,#f7971e,var(--gold));
  border:none;border-radius:14px;color:#0d1b2a;cursor:pointer;
  box-shadow:0 4px 18px rgba(255,210,0,.32);
}

/* ── CONFETTI ───────────────────────────────── */
.conf{
  position:fixed;border-radius:3px;
  pointer-events:none;z-index:200;
  animation:cffall linear forwards;
}
@keyframes cffall{to{transform:translateY(110vh) rotate(900deg);opacity:0}}
</style>
</head>
<body>

<div class="app">

  <!-- INSTALL BANNER -->
  <div class="banner" id="banner">
    <p>📲 Установи как приложение на экран!</p>
    <button class="ibtn" onclick="installPWA()">Установить</button>
    <button class="xbtn" onclick="closeBanner()">✕</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🌍 Шейкер<span>Квиз</span></div>
    <div class="pring">
      <svg viewBox="0 0 44 44">
        <circle class="tr" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="0"/>
        <circle class="fi" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="113" id="pcirc"/>
      </svg>
      <div class="pring-lbl" id="plbl">0%</div>
    </div>
  </div>

  <!-- SCORES -->
  <div class="scores">
    <div class="sc c"><div class="v" id="sv0">0</div><div class="l">✅ Верно</div></div>
    <div class="sc w"><div class="v" id="sv1">0</div><div class="l">❌ Ошибки</div></div>
    <div class="sc s"><div class="v" id="sv2">0</div><div class="l">🔥 Серия</div></div>
  </div>

  <!-- SHAKER ZONE -->
  <div class="zone">
    <div class="cup-wrap" id="cupWrap" onclick="handleBtn()">
      <div class="ring" id="ring"></div>
      <span class="cup" id="cup">🎲</span>
    </div>
    <p class="hint" id="hint">Нажми на кубик или<br>потряси телефон!</p>
  </div>

  <!-- QUESTION CARD -->
  <div class="card-wrap">
    <div class="card" id="card">
      <div class="empty" id="empty">
        <div class="big">🎲</div>
        Нажми кубик или потряси телефон,<br>чтобы получить вопрос
      </div>
      <div id="qc" style="display:none">
        <div class="qmeta">
          <span class="ctag" id="qcat"></span>
          <span class="dtag" id="qdiff"></span>
        </div>
        <div class="qtext" id="qtext"></div>
        <div class="opts"  id="opts"></div>
        <div class="fb"    id="fb"></div>
      </div>
    </div>
  </div>

  <!-- MAIN BUTTON -->
  <button class="mbtn" id="mbtn" onclick="handleBtn()">🎰 Потрясти!</button>

</div>

<!-- STREAK BADGE -->
<div class="sbadge" id="sbadge"></div>

<!-- RESULTS OVERLAY -->
<div class="overlay" id="overlay">
  <div class="rsheet">
    <div class="re" id="re">🏆</div>
    <div class="rt" id="rt">Квиз завершён!</div>
    <div class="rs" id="rs">Все вопросы пройдены</div>
    <div class="rstats">
      <div class="rstat"><div class="rv" id="rscore">0</div><div class="rl">Очков</div></div>
      <div class="rstat"><div class="rv" id="rpct">0%</div><div class="rl">Точность</div></div>
      <div class="rstat"><div class="rv" id="rbest">0</div><div class="rl">Серия</div></div>
    </div>
    <button class="rbtn" onclick="restart()">🔄 Играть снова</button>
  </div>
</div>

<script>
// ── ВОПРОСЫ ────────────────────────────────────────────────────────────────
const QS=[
  {cat:"Столицы",    diff:"easy",  q:"Столица Франции?",                              opts:["Берлин","Мадрид","Париж","Рим"],                      a:2,fact:"Париж — столица с 987 года, один из самых посещаемых городов мира."},
  {cat:"Столицы",    diff:"easy",  q:"Столица Австралии?",                            opts:["Сидней","Мельбурн","Канберра","Брисбен"],             a:2,fact:"Канберра стала столицей в 1913 г. Многие ошибочно называют Сидней."},
  {cat:"Столицы",    diff:"easy",  q:"Столица Японии?",                               opts:["Осака","Токио","Киото","Нагоя"],                      a:1,fact:"Токио — один из крупнейших мегаполисов мира (~37 млн чел.)."},
  {cat:"Столицы",    diff:"medium",q:"Столица Канады?",                               opts:["Торонто","Монреаль","Ванкувер","Оттава"],             a:3,fact:"Оттава — столица с 1857 г. Торонто — крупнейший город, но не столица."},
  {cat:"Столицы",    diff:"medium",q:"Столица Бразилии?",                             opts:["Рио-де-Жанейро","Сан-Паулу","Бразилиа","Салвадор"],  a:2,fact:"Бразилиа построена специально и стала столицей в 1960 году."},
  {cat:"Столицы",    diff:"medium",q:"Столица Казахстана с 2022 года?",               opts:["Алматы","Нур-Султан","Астана","Шымкент"],             a:2,fact:"Астана — столица с 1997 г. В 2019–2022 носила название Нур-Султан."},
  {cat:"Столицы",    diff:"hard",  q:"Столица Чада?",                                 opts:["Лагос","Яунде","Нджамена","Хартум"],                  a:2,fact:"Нджамена — столица Республики Чад в Центральной Африке."},
  {cat:"Столицы",    diff:"hard",  q:"Столица Мьянмы?",                               opts:["Янгон","Нейпьидо","Мандалай","Ситтве"],               a:1,fact:"Нейпьидо стала столицей в 2005 г., сменив Янгон."},
  {cat:"Столицы",    diff:"hard",  q:"Столица Микронезии?",                           opts:["Тарава","Нанди","Паликир","Апиа"],                    a:2,fact:"Паликир — один из наименее известных городов-столиц мира."},
  {cat:"Рекорды",    diff:"easy",  q:"Самый большой океан на Земле?",                 opts:["Атлантический","Индийский","Тихий","Северный Ледовитый"],a:2,fact:"Тихий океан занимает ~50% площади Мирового океана."},
  {cat:"Рекорды",    diff:"easy",  q:"Самая длинная река мира?",                      opts:["Амазонка","Нил","Янцзы","Миссисипи"],                 a:1,fact:"Нил (~6650 км) — самая длинная. Амазонка — самая полноводная."},
  {cat:"Рекорды",    diff:"easy",  q:"Самая высокая гора?",                           opts:["К2","Монблан","Эльбрус","Эверест"],                   a:3,fact:"Эверест — 8849 м над уровнем моря."},
  {cat:"Рекорды",    diff:"medium",q:"Самое глубокое озеро?",                         opts:["Каспий","Байкал","Танганьика","Верхнее"],              a:1,fact:"Байкал — 1642 м, хранит ~20% мировых запасов пресной воды."},
  {cat:"Рекорды",    diff:"medium",q:"Самая большая страна по площади?",              opts:["Канада","Китай","США","Россия"],                      a:3,fact:"Россия — 17,1 млн км², около 11% суши планеты."},
  {cat:"Рекорды",    diff:"medium",q:"Самая длинная горная цепь?",                    opts:["Гималаи","Альпы","Анды","Скалистые горы"],            a:2,fact:"Анды — ~7500 км вдоль западного побережья Южной Америки."},
  {cat:"Рекорды",    diff:"hard",  q:"Самая большая горячая пустыня мира?",           opts:["Аравийская","Гоби","Сахара","Калахари"],              a:2,fact:"Сахара — ~9 млн км². Антарктида больше, но это холодная пустыня."},
  {cat:"Рекорды",    diff:"hard",  q:"Самый маленький океан?",                        opts:["Индийский","Атлантический","Южный","Северный Ледовитый"],a:3,fact:"Северный Ледовитый — ~14 млн км², самый мелководный из всех."},
  {cat:"Страны",     diff:"easy",  q:"На каком континенте находится Египет?",         opts:["Азия","Европа","Африка","Ю. Америка"],                a:2,fact:"Основная территория Египта — в Африке, Синай — в Азии."},
  {cat:"Страны",     diff:"easy",  q:"Сколько стран в Соединённом Королевстве?",      opts:["2","3","4","5"],                                      a:2,fact:"Англия, Шотландия, Уэльс, Северная Ирландия = 4 страны."},
  {cat:"Страны",     diff:"medium",q:"Страна с наибольшим числом соседей?",           opts:["Россия","Китай","Бразилия","Германия"],               a:1,fact:"Китай и Россия делят рекорд — по 14 соседних государств."},
  {cat:"Страны",     diff:"medium",q:"Пролив между Европой и Африкой?",               opts:["Дрейка","Малаккский","Гибралтарский","Баб-эль-Мандебский"],a:2,fact:"Гибралтарский пролив — всего 14 км в самом узком месте."},
  {cat:"Страны",     diff:"medium",q:"Государство-анклав внутри Италии?",             opts:["Монако","Сан-Марино","Лихтенштейн","Андорра"],        a:1,fact:"Сан-Марино — анклав в Италии, считается старейшей республикой мира."},
  {cat:"Страны",     diff:"hard",  q:"Остров, разделённый Индонезией и Папуа Новой Гвинеей?",opts:["Суматра","Калимантан","Новая Гвинея","Сулавеси"],a:2,fact:"Новая Гвинея делится между Индонезией и государством ПНГ."},
  {cat:"Природа",    diff:"easy",  q:"Другое название Северного сияния?",             opts:["Цунами","Торнадо","Аврора Бореалис","Муссон"],        a:2,fact:"Аврора Бореалис — взаимодействие солнечного ветра с магнитосферой."},
  {cat:"Природа",    diff:"medium",q:"Где находится водопад Анхель?",                 opts:["Бразилия","Аргентина","Венесуэла","Колумбия"],        a:2,fact:"Анхель (979 м) в Венесуэле — самый высокий водопад Земли."},
  {cat:"Природа",    diff:"medium",q:"Самый засушливый континент?",                   opts:["Африка","Австралия","Антарктида","Азия"],              a:2,fact:"Антарктида — ледяная пустыня, осадков < 200 мм в год."},
  {cat:"Природа",    diff:"hard",  q:"Биогеографическая граница фауны Азии и Австралии?",opts:["Линия Гумбольдта","Линия Уоллеса","Линия Дарвина","Экватор"],a:1,fact:"Линия Уоллеса проходит через Индонезийский архипелаг."},
  {cat:"Символы",    diff:"easy",  q:"На флаге какой страны кленовый лист?",          opts:["США","Австралия","Канада","Новая Зеландия"],           a:2,fact:"Кленовый лист — национальный символ Канады с 1965 года."},
  {cat:"Символы",    diff:"medium",q:"На флаге какой страны изображена карта страны?",opts:["Кипр","Мальта","Косово","Тунис"],                     a:0,fact:"Кипр — единственная страна, на флаге которой карта её территории."},
  {cat:"Горы/реки",  diff:"medium",q:"Самая полноводная река мира?",                  opts:["Нил","Янцзы","Амазонка","Конго"],                     a:2,fact:"Амазонка несёт ~20% всей пресной воды, попадающей в океан."},
];

// ── СОСТОЯНИЕ ──────────────────────────────────────────────────────────────
let pool=[],current=null,answered=false;
let correct=0,wrong=0,streak=0,bestStreak=0;
const TOTAL=QS.length;

// ── PWA: INSTALL PROMPT ────────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('banner').classList.add('on');
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;closeBanner();});
}
function closeBanner(){ document.getElementById('banner').classList.remove('on'); }

// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── SHAKE DETECTION (DeviceMotion) ─────────────────────────────────────────
let lx=null,ly=null,lz=null,shLock=null;
const THRESH=17;

function enableMotion(){
  if(typeof DeviceMotionEvent!=='undefined'&&
     typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission()
      .then(r=>{ if(r==='granted') window.addEventListener('devicemotion',onMotion); })
      .catch(()=>{});
  } else {
    window.addEventListener('devicemotion',onMotion);
  }
}

function onMotion(e){
  const a=e.accelerationIncludingGravity; if(!a) return;
  const {x,y,z}=a;
  if(lx===null){lx=x;ly=y;lz=z;return;}
  const d=Math.abs(x-lx)+Math.abs(y-ly)+Math.abs(z-lz);
  lx=x;ly=y;lz=z;
  if(d>THRESH&&!shLock){
    shLock=setTimeout(()=>shLock=null,1000);
    handleBtn();
  }
}

// Запрашиваем разрешение при первом касании (iOS 13+)
document.getElementById('cupWrap').addEventListener('click',enableMotion,{once:true});

// ── ВИБРАЦИЯ ───────────────────────────────────────────────────────────────
const vib=p=>{ if('vibrate'in navigator) navigator.vibrate(p); };

// ── ЛОГИКА ─────────────────────────────────────────────────────────────────
function initPool(){ pool=[...QS].sort(()=>Math.random()-.5); }

function restart(){
  correct=wrong=streak=bestStreak=0;
  answered=false;current=null;
  initPool(); updateUI();
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('empty').style.display='block';
  document.getElementById('qc').style.display='none';
  setBtn('🎰 Потрясти!',false);
  document.getElementById('hint').textContent='Нажми на кубик или потряси телефон!';
}

function updateUI(){
  document.getElementById('sv0').textContent=correct;
  document.getElementById('sv1').textContent=wrong;
  document.getElementById('sv2').textContent=streak;
  const done=TOTAL-pool.length;
  const pct=Math.round(done/TOTAL*100);
  const C=2*Math.PI*18; // ~113.1
  document.getElementById('pcirc').style.strokeDashoffset=C-(C*pct/100);
  document.getElementById('plbl').textContent=pct+'%';
}

function setBtn(txt,dis){
  const b=document.getElementById('mbtn');
  b.textContent=txt; b.disabled=dis;
}

function handleBtn(){
  const btn=document.getElementById('mbtn');
  if(btn.disabled) return;
  if(answered){
    if(pool.length===0){showResults();return;}
    answered=false;
    doShake();
  } else {
    if(pool.length===0){showResults();return;}
    doShake();
  }
}

function doShake(){
  const cup=document.getElementById('cup');
  const ring=document.getElementById('ring');
  setBtn('🎰 Потрясти!',true);
  vib([25,15,40]);

  cup.classList.remove('sh'); ring.classList.remove('pulse');
  void cup.offsetWidth;
  cup.classList.add('sh'); ring.classList.add('pulse');

  setTimeout(()=>{
    cup.classList.remove('sh'); ring.classList.remove('pulse');
    showQuestion();
    setBtn('🎰 Потрясти!',false);
  },800);
}

function showQuestion(){
  current=pool.pop();
  answered=false;
  updateUI();

  document.getElementById('empty').style.display='none';
  document.getElementById('qc').style.display='block';
  document.getElementById('fb').className='fb';
  document.getElementById('fb').textContent='';
  document.getElementById('hint').textContent='↑ Потряси для следующего вопроса';

  document.getElementById('qcat').textContent='🌐 '+current.cat;

  const de=document.getElementById('qdiff');
  const dm={easy:['easy','⭐ Лёгкий'],medium:['medium','⭐⭐ Средний'],hard:['hard','⭐⭐⭐ Сложный']};
  de.className='dtag '+dm[current.diff][0];
  de.textContent=dm[current.diff][1];
  document.getElementById('qtext').textContent=current.q;

  const sh=[0,1,2,3].sort(()=>Math.random()-.5);
  const og=document.getElementById('opts');
  og.innerHTML='';
  sh.forEach(i=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=current.opts[i];
    b.dataset.i=i; b.onclick=()=>pick(b,i);
    og.appendChild(b);
  });

  const card=document.getElementById('card');
  card.className='card new';
  setTimeout(()=>card.className='card',400);
  document.querySelector('.card-wrap').scrollTop=0;
}

function pick(btn,idx){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  const ok=idx===current.a;
  const fb=document.getElementById('fb');

  if(ok){
    btn.classList.add('ok');
    correct++; streak++;
    if(streak>bestStreak) bestStreak=streak;
    fb.className='fb ok on';
    fb.textContent='✅ '+current.fact;
    vib([40,20,70]);
    if(streak>=3){ showBadge('🔥 Серия × '+streak+'!'); confetti(); }
  } else {
    btn.classList.add('no');
    wrong++; streak=0;
    fb.className='fb no on';
    fb.textContent='❌ Верно: «'+current.opts[current.a]+'». '+current.fact;
    vib([90,40,90]);
    document.querySelectorAll('.opt').forEach(b=>{
      if(+b.dataset.i===current.a) b.classList.add('ok');
    });
  }

  updateUI();
  setBtn(pool.length===0?'🏆 Результаты':'➡️ Следующий вопрос',false);
}

function showBadge(txt){
  const b=document.getElementById('sbadge');
  b.textContent=txt; b.className='sbadge';
  void b.offsetWidth; b.className='sbadge pop';
}

function showResults(){
  const tot=correct+wrong;
  const pct=tot?Math.round(correct/tot*100):0;
  const score=Math.max(0,correct*10-wrong*3);
  let e='😅',t='Не сдавайся!';
  if(pct>=90){e='🏆';t='Ты — гений географии!';}
  else if(pct>=75){e='🥇';t='Отличный результат!';}
  else if(pct>=60){e='🌍';t='Хорошая работа!';}
  else if(pct>=40){e='🗺️';t='Есть куда расти!';}
  document.getElementById('re').textContent=e;
  document.getElementById('rt').textContent=t;
  document.getElementById('rs').textContent='Пройдено вопросов: '+tot;
  document.getElementById('rscore').textContent=score;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rbest').textContent=bestStreak;
  document.getElementById('overlay').classList.add('on');
  if(pct>=60){ vib([50,30,50,30,100]); confetti(50); }
}

function confetti(n=22){
  const cl=['#ffd166','#4dffb0','#ff6b6b','#aad4f5','#f7971e','#fff','#c77dff'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='conf';
      el.style.cssText=`left:${Math.random()*100}vw;top:-12px;`+
        `width:${Math.random()*8+5}px;height:${Math.random()*8+5}px;`+
        `background:${cl[Math.floor(Math.random()*cl.length)]};`+
        `animation-duration:${Math.random()*2+1.5}s;`+
        `animation-delay:${Math.random()*.4}s;`+
        `border-radius:${Math.random()>.5?'50%':'3px'};`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3200);
    },i*55);
  }
}

// ── СТАРТ ──────────────────────────────────────────────────────────────────
initPool(); updateUI();

// Блокируем pull-to-refresh и double-tap-zoom
document.addEventListener('touchmove',e=>{
  if(e.touches.length===1) e.preventDefault();
},{passive:false});
</script>
</body>
</html>
