<style>
:root{
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
  --gold:#ffd200;--green:#4dffb0;--red:#ff6b6b;--blue:#aad4f5;
  --bg1:#0d1b2a;--bg2:#1a3a5c;--card:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.13);--sub:rgba(255,255,255,.55);--r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,var(--bg1),var(--bg2));
  font-family:-apple-system,'Nunito',system-ui,sans-serif;color:#fff;
  overscroll-behavior:none;-webkit-user-select:none;user-select:none;}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;
  padding:calc(14px + var(--sat)) max(14px,var(--sar)) calc(14px + var(--sab)) max(14px,var(--sal));
  gap:10px;overflow:hidden;}
.banner{display:none;background:rgba(255,210,0,.1);border:1px solid rgba(255,210,0,.25);
  border-radius:14px;padding:9px 12px;align-items:center;gap:10px;flex-shrink:0;}
.banner.on{display:flex;}
.banner p{font-size:.78rem;font-weight:700;color:var(--gold);flex:1;line-height:1.3;}
.banner .ibtn{background:var(--gold);border:none;border-radius:9px;padding:6px 12px;
  font-size:.78rem;font-weight:900;font-family:inherit;color:#0d1b2a;cursor:pointer;}
.banner .xbtn{background:none;border:none;color:var(--sub);font-size:1.1rem;cursor:pointer;padding:2px 6px;}
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:1.2rem;font-weight:900;letter-spacing:.4px;}
.logo span{color:var(--gold);}
.bank-badge{background:rgba(255,210,0,.12);border:1px solid rgba(255,210,0,.25);
  color:var(--gold);font-size:.68rem;font-weight:800;padding:4px 10px;border-radius:20px;}
.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex-shrink:0;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:7px 4px;text-align:center;backdrop-filter:blur(10px);}
.sc .v{font-size:1.35rem;font-weight:900;line-height:1;}
.sc .l{font-size:.6rem;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-top:2px;}
.sc.c .v{color:var(--green);}.sc.w .v{color:var(--red);}.sc.s .v{color:var(--gold);}
.prog-wrap{flex-shrink:0;}
.prog-track{background:rgba(255,255,255,.08);border-radius:50px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#f7971e,var(--gold));border-radius:50px;transition:width .4s ease;width:0%;}
.prog-lbl{display:flex;justify-content:space-between;margin-top:4px;}
.prog-lbl span{font-size:.65rem;color:var(--sub);font-weight:700;}
.cat-indicator{font-size:.72rem;font-weight:800;text-align:center;padding:3px 0;
  color:rgba(255,255,255,.5);letter-spacing:.5px;flex-shrink:0;}
.zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden;}
.hint{font-size:.78rem;color:var(--sub);font-weight:600;text-align:center;}
.cup-wrap{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;width:120%;height:120%;border-radius:50%;border:2.5px solid rgba(255,210,0,.45);opacity:0;pointer-events:none;}
.ring.pulse{animation:ringout .55s ease-out forwards;}
@keyframes ringout{0%{transform:scale(.75);opacity:.9}100%{transform:scale(1.7);opacity:0}}
.cup{font-size:clamp(70px,18vw,108px);display:block;line-height:1;
  filter:drop-shadow(0 0 22px rgba(255,210,0,.4));animation:afloat 3.5s ease-in-out infinite;}
@keyframes afloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(4deg);}}
@keyframes bigshake{
  0%{transform:rotate(0deg) translateY(0) scale(1);}12%{transform:rotate(-22deg) translateY(-10px) scale(1.06);}
  28%{transform:rotate(22deg) translateY(-18px) scale(1.12);}44%{transform:rotate(-17deg) translateY(-9px) scale(1.06);}
  58%{transform:rotate(17deg) translateY(-13px) scale(1.09);}72%{transform:rotate(-11deg) translateY(-5px) scale(1.02);}
  86%{transform:rotate(7deg) translateY(-2px) scale(1);}100%{transform:rotate(0deg) translateY(0) scale(1);}}
.cup.sh{animation:bigshake .78s cubic-bezier(.36,.07,.19,.97) forwards;filter:drop-shadow(0 0 40px rgba(255,210,0,.9));}
.card-wrap{flex:0 0 auto;max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none;}
.card-wrap::-webkit-scrollbar{display:none;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;backdrop-filter:blur(16px);}
@keyframes cardin{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.card.new{animation:cardin .35s ease;}
.empty{text-align:center;padding:22px 12px;color:var(--sub);font-size:.9rem;font-weight:600;line-height:1.6;}
.empty .big{font-size:2.2rem;margin-bottom:6px;}
.qmeta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
.ctag{background:rgba(255,209,0,.15);border:1px solid rgba(255,209,0,.3);color:var(--gold);
  font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dtag{font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.easy{background:rgba(77,255,176,.14);color:var(--green);border:1px solid rgba(77,255,176,.3);}
.medium{background:rgba(255,200,50,.14);color:#ffc832;border:1px solid rgba(255,200,50,.3);}
.hard{background:rgba(255,107,107,.14);color:var(--red);border:1px solid rgba(255,107,107,.3);}
.qtext{font-size:clamp(.92rem,3.2vw,1.05rem);font-weight:700;line-height:1.45;margin-bottom:14px;color:#fff;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:12px 9px;font-size:.86rem;font-weight:700;font-family:inherit;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);
  border-radius:12px;color:#ddeeff;cursor:pointer;text-align:left;line-height:1.3;
  transition:background .15s,border-color .15s,transform .1s;min-height:50px;display:flex;align-items:center;}
.opt:active:not(:disabled){transform:scale(.97);}
.opt.ok{background:rgba(77,255,176,.2);border-color:var(--green);color:var(--green);animation:popin .3s ease;}
.opt.no{background:rgba(255,107,107,.15);border-color:var(--red);color:#ff9f9f;animation:wrongsh .3s ease;}
@keyframes popin{0%{transform:scale(.96)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes wrongsh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.opt:disabled{cursor:default;}
.fb{margin-top:11px;padding:11px 13px;border-radius:12px;font-size:.82rem;font-weight:700;line-height:1.4;display:none;}
.fb.on{display:block;animation:fadein .3s ease;}
.fb.ok{background:rgba(77,255,176,.11);border:1px solid rgba(77,255,176,.32);color:var(--green);}
.fb.no{background:rgba(255,107,107,.09);border:1px solid rgba(255,107,107,.28);color:#ffaaaa;}
.mbtn{width:100%;padding:15px;font-size:.98rem;font-weight:900;font-family:inherit;
  background:linear-gradient(135deg,#f7971e,var(--gold));border:none;border-radius:16px;
  color:#0d1b2a;cursor:pointer;box-shadow:0 4px 20px rgba(255,210,0,.32);
  transition:transform .1s,box-shadow .1s,opacity .2s;letter-spacing:.3px;flex-shrink:0;}
.mbtn:active{transform:scale(.98);}
.mbtn:disabled{opacity:.45;}
.sbadge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#f7971e,var(--gold));color:#0d1b2a;
  font-size:1.05rem;font-weight:900;padding:13px 26px;border-radius:50px;
  z-index:50;pointer-events:none;white-space:nowrap;box-shadow:0 8px 28px rgba(255,210,0,.5);}
.sbadge.pop{animation:sbpop 1.6s ease forwards;}
@keyframes sbpop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}20%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}
  35%{transform:translate(-50%,-50%) scale(1);opacity:1;}80%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(.8);opacity:0;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);z-index:100;align-items:flex-end;justify-content:center;
  padding:0 16px calc(20px + var(--sab));}
.overlay.on{display:flex;animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.rsheet{background:linear-gradient(160deg,#1a2d42,#0d1b2a);border:1px solid rgba(255,255,255,.17);
  border-radius:26px 26px 20px 20px;padding:30px 22px 26px;width:100%;max-width:430px;
  text-align:center;animation:slideup .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes slideup{from{transform:translateY(90px);opacity:0}to{transform:none;opacity:1}}
.rsheet .re{font-size:3.2rem;margin-bottom:8px;}.rsheet .rt{font-size:1.45rem;font-weight:900;margin-bottom:4px;}
.rsheet .rs{font-size:.82rem;color:var(--sub);margin-bottom:22px;}
.rstats{display:flex;justify-content:center;gap:22px;margin-bottom:26px;}
.rstat .rv{font-size:2rem;font-weight:900;color:var(--gold);}
.rstat .rl{font-size:.62rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.rbtn{width:100%;padding:15px;font-size:.98rem;font-weight:900;font-family:inherit;
  background:linear-gradient(135deg,#f7971e,var(--gold));border:none;border-radius:14px;
  color:#0d1b2a;cursor:pointer;box-shadow:0 4px 18px rgba(255,210,0,.32);}
.conf{position:fixed;border-radius:3px;pointer-events:none;z-index:200;animation:cffall linear forwards;}
@keyframes cffall{to{transform:translateY(110vh) rotate(900deg);opacity:0}}
</style>
</head>

<div class="app">
  <div class="banner" id="banner">

  </div>
  <div class="cat-indicator" id="catInd">🎲 Потряси, чтобы начать!</div>
  <div class="zone">
    <div class="cup-wrap" id="cupWrap" onclick="handleBtn()">
      <div class="ring" id="ring"></div>
      <span class="cup" id="cup">🎲</span>
    </div>
    <p class="hint" id="hint">Нажми или потряси телефон!</p>
  </div>
  <div class="card-wrap">
    <div class="card" id="card">

        <div class="opts" id="opts"></div>
        <div class="fb" id="fb"></div>
      </div>
    </div>
  </div>
  <button class="mbtn" id="mbtn" onclick="handleBtn()">🎰 Потрясти!</button>
</div>
<div class="sbadge" id="sbadge"></div>
<div class="overlay" id="overlay">
  <div class="rsheet">
    <div class="re" id="re">🏆</div><div class="rt" id="rt">Квиз завершён!</div>
    <div class="rs" id="rs">Все вопросы пройдены</div>
    <div class="rstats">
      <div class="rstat"><div class="rv" id="rscore">0</div><div class="rl">Очков</div></div>
      <div class="rstat"><div class="rv" id="rpct">0%</div><div class="rl">Точность</div></div>
      <div class="rstat"><div class="rv" id="rbest">0</div><div class="rl">Серия</div></div>
    </div>
    <button class="rbtn" onclick="restart()">🔄 Играть снова</button>
  </div>
</div>

function rnd(arr, n) { return [...arr].sort(() => Math.random()-.5).slice(0, n); }
function rnde(arr, excl, n) { return rnd(arr.filter(x => !excl.includes(x)), n); }

function fmtN(n) {
  // Форматирование числа с разделителем тысяч (пробел)
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u202F');
}
function fmtArea(km2) {
  if (km2 >= 1000000) return (km2/1000000).toFixed(1).replace('.',',') + ' млн км²';
  return fmtN(km2) + ' км²';
}
function fmtPop(popM) {
  if (popM >= 100) return '~' + Math.round(popM) + ' млн';
  if (popM >= 1)   return '~' + popM.toFixed(1).replace('.',',') + ' млн';
  return '~' + Math.round(popM * 1000) + ' тыс.';
}

//  ГЕНЕРАТОР БАНКА
// ══════════════════════════════════════════════════════════════════════════
function buildBank() {
  const bank = [];
  const caps  = CTRY.map(c => c[2]);
  const names = CTRY.map(c => c[0]);

  // ── СТОЛИЦЫ: 3 типа ────────────────────────────────────────────────────
  CTRY.forEach(c => {
    const wc1 = rnde(caps, [c[2]], 3);
    if (wc1.length===3) bank.push({cat:"Столицы",diff:c[6],
      q:`Какая столица ${c[1]}?`,opts:[c[2],...wc1],a:0,
      fact:`${c[2]} — столица ${c[0]}.`});

    const wc2 = rnde(names, [c[0]], 3);
    if (wc2.length===3) bank.push({cat:"Столицы",diff:c[6],
      q:`${c[2]} — столица какой страны?`,opts:[c[0],...wc2],a:0,
      fact:`${c[2]} — столица ${c[0]}.`});

    const wc3 = rnde(CONTS, [c[3]], 3);
    if (wc3.length===3) bank.push({cat:"Континенты",diff:c[6],
      q:`На каком континенте находится ${c[0]}?`,opts:[c[3],...wc3],a:0,
      fact:`${c[0]} расположена в регионе: ${c[3]}.`});
  });

  // ── РЕКОРДЫ: площадь (наибольшая) ──────────────────────────────────────
  for (let i=0; i<180; i++) {
    const four = rnd(CTRY,4);
    const sh   = [...four].sort(()=>Math.random()-.5);
    const w    = [...four].sort((a,b)=>b[4]-a[4])[0];
    const wi   = sh.indexOf(w);
    bank.push({cat:"Рекорды",diff:"medium",
      q:QB[i%QB.length],opts:sh.map(c=>c[0]),a:wi,
      fact:`${w[0]} — самая большая: ${fmtArea(w[4])}.`});
  }

  // ── РЕКОРДЫ: площадь (наименьшая) ──────────────────────────────────────
  for (let i=0; i<100; i++) {
    const four = rnd(CTRY,4);
    const sh   = [...four].sort(()=>Math.random()-.5);
    const w    = [...four].sort((a,b)=>a[4]-b[4])[0];
    const wi   = sh.indexOf(w);
    bank.push({cat:"Рекорды",diff:"hard",
      q:QS[i%QS.length],opts:sh.map(c=>c[0]),a:wi,
      fact:`${w[0]} — наименьшая: ${fmtArea(w[4])}.`});
  }

  // ── РЕКОРДЫ: точная площадь страны ─────────────────────────────────────
  CTRY.filter(c=>c[4]>5000).forEach(c=>{
    const real = fmtArea(c[4]);
    const factors = [0.25,0.4,0.6,0.75,1.6,2.5,4].sort(()=>Math.random()-.5);
    const wrongs  = [];
    for (const f of factors) {
      if (wrongs.length>=3) break;
      let w = Math.round(c[4]*f);
      if (w>=1000000) w=Math.round(w/100000)*100000;
      else if (w>=100000) w=Math.round(w/10000)*10000;
      else if (w>=10000)  w=Math.round(w/1000)*1000;
      else w=Math.round(w/500)*500;
      const ws = fmtArea(w);
      if (ws!==real && !wrongs.includes(ws)) wrongs.push(ws);
    }
    if (wrongs.length<3) return;
    const templates = [
      `Какова площадь ${c[1]}?`,
      `Территория ${c[0]} составляет примерно...`,
      `Сколько км² занимает ${c[0]}?`,
    ];
    bank.push({cat:"Рекорды",diff:c[6],
      q:templates[Math.floor(Math.random()*templates.length)],
      opts:[real,...wrongs],a:0,
      fact:`Площадь ${c[0]} — ${real}.`});
  });

  // ── НАСЕЛЕНИЕ: наибольшее ──────────────────────────────────────────────
  for (let i=0; i<150; i++) {
    const four = rnd(CTRY,4);
    const sh   = [...four].sort(()=>Math.random()-.5);
    const w    = [...four].sort((a,b)=>b[5]-a[5])[0];
    const wi   = sh.indexOf(w);
    bank.push({cat:"Население",diff:"medium",
      q:QP[i%QP.length],opts:sh.map(c=>c[0]),a:wi,
      fact:`${w[0]} — ${fmtPop(w[5])}, самая населённая.`});
  }

  // ── НАСЕЛЕНИЕ: наименьшее ──────────────────────────────────────────────
  for (let i=0; i<80; i++) {
    const four = rnd(CTRY,4);
    const sh   = [...four].sort(()=>Math.random()-.5);
    const w    = [...four].sort((a,b)=>a[5]-b[5])[0];
    const wi   = sh.indexOf(w);
    bank.push({cat:"Население",diff:"hard",
      q:QL[i%QL.length],opts:sh.map(c=>c[0]),a:wi,
      fact:`${w[0]} — ${fmtPop(w[5])}, наименее населённая.`});
  }

  // ── НАСЕЛЕНИЕ: плотность ──────────────────────────────────────────────
  for (let i=0; i<60; i++) {
    const four = rnd(CTRY.filter(c=>c[4]>100),4);
    const sh   = [...four].sort(()=>Math.random()-.5);
    const w    = [...four].sort((a,b)=>(b[5]*1e6/b[4])-(a[5]*1e6/a[4]))[0];
    const wi   = sh.indexOf(w);
    const dens = Math.round(w[5]*1e6/w[4]);
    bank.push({cat:"Население",diff:"hard",
      q:"В какой из этих стран самая высокая плотность населения?",
      opts:sh.map(c=>c[0]),a:wi,
      fact:`${w[0]} — плотность ~${fmtN(dens)} чел/км².`});
  }

  // ── НАСЕЛЕНИЕ: точная численность ─────────────────────────────────────
  CTRY.filter(c=>c[5]>=1).forEach(c=>{
    const real = fmtPop(c[5]);
    const factors=[0.3,0.5,0.7,2,3,5].sort(()=>Math.random()-.5);
    const wrongs=[];
    for (const f of factors) {
      if (wrongs.length>=3) break;
      const ws = fmtPop(c[5]*f);
      if (ws!==real && !wrongs.includes(ws)) wrongs.push(ws);
    }
    if (wrongs.length<3) return;
    const q = [`Сколько человек живёт в ${c[1]}?`,
               `Численность населения ${c[0]} составляет примерно...`,
               `Население ${c[0]}:`][Math.floor(Math.random()*3)];
    bank.push({cat:"Население",diff:c[6],q,opts:[real,...wrongs],a:0,
      fact:`В ${c[0]} проживает ${real} человек.`});
  });

  // ── КОНТИНЕНТЫ: НЕ в этом регионе ────────────────────────────────────
  CONTS.forEach(cont=>{
    const inC = CTRY.filter(c=>c[3]===cont);
    const outC= CTRY.filter(c=>c[3]!==cont);
    for (let i=0;i<30;i++){
      if (inC.length<3||outC.length<1) break;
      const out=rnd(outC,1)[0], ins=rnd(inC,3);
      const sh=[out,...ins].sort(()=>Math.random()-.5);
      const wi=sh.indexOf(out);
      bank.push({cat:"Континенты",diff:"medium",
        q:`Какая из этих стран НЕ находится в регионе «${cont}»?`,
        opts:sh.map(c=>c[0]),a:wi,
        fact:`${out[0]} — ${out[3]}, а не ${cont}.`});
    }
  });

  // ── ГОРЫ ─────────────────────────────────────────────────────────────
  const mtLocs = [...new Set(MNTS.map(m=>m[1]))];
  MNTS.forEach(m=>{
    const wl = rnde(mtLocs,[m[1]],3);
    if (wl.length>=3) bank.push({cat:"Горы",diff:m[4],
      q:`Где находится гора ${m[0]}?`,opts:[m[1],...wl.slice(0,3)],a:0,
      fact:`${m[0]} (${fmtN(m[3])} м) расположена в ${m[1]}.`});
    const wc=rnde(CONTS,[m[2]],3);
    if (wc.length===3) bank.push({cat:"Горы",diff:m[4],
      q:`На каком континенте находится гора ${m[0]}?`,opts:[m[2],...wc],a:0,
      fact:`${m[0]} (${fmtN(m[3])} м) — ${m[2]}.`});
  });
  for (let i=0;i<80;i++){
    const four=rnd(MNTS,4), sh=[...four].sort(()=>Math.random()-.5);
    const w=[...four].sort((a,b)=>b[3]-a[3])[0], wi=sh.indexOf(w);
    bank.push({cat:"Горы",diff:"hard",
      q:QH[i%QH.length],opts:sh.map(m=>m[0]),a:wi,
      fact:`${w[0]} — ${fmtN(w[3])} м, самая высокая.`});
  }

  // ── РЕКИ ─────────────────────────────────────────────────────────────
  const rvMouths=[...new Set(RVRS.map(r=>r[3]))];
  RVRS.forEach(r=>{
    const wc=rnde(CONTS,[r[1]],3);
    if (wc.length===3) bank.push({cat:"Реки",diff:r[4],
      q:`На каком континенте протекает река ${r[0]}?`,opts:[r[1],...wc],a:0,
      fact:`${r[0]} (${fmtN(r[2])} км) протекает в ${r[1]}.`});
    const wm=rnde(rvMouths,[r[3]],3);
    if (wm.length>=3) bank.push({cat:"Реки",diff:r[4],
      q:`Куда впадает река ${r[0]}?`,opts:[r[3],...wm.slice(0,3)],a:0,
      fact:`${r[0]} (${fmtN(r[2])} км) впадает в ${r[3]}.`});
  });
  for (let i=0;i<80;i++){
    const four=rnd(RVRS,4), sh=[...four].sort(()=>Math.random()-.5);
    const w=[...four].sort((a,b)=>b[2]-a[2])[0], wi=sh.indexOf(w);
    bank.push({cat:"Реки",diff:"medium",
      q:QR[i%QR.length],opts:sh.map(r=>r[0]),a:wi,
      fact:`${w[0]} — ${fmtN(w[2])} км, самая длинная.`});
  }

  // ── ОЗЁРА ────────────────────────────────────────────────────────────
  const lkLocs=[...new Set(LKES.map(l=>l[1]))];
  LKES.forEach(l=>{
    const wl=rnde(lkLocs,[l[1]],3);
    if (wl.length>=3) bank.push({cat:"Озёра",diff:l[4],
      q:`Где находится озеро ${l[0]}?`,opts:[l[1],...wl.slice(0,3)],a:0,
      fact:`Озеро ${l[0]} — ${l[1]}. Площадь: ${fmtN(l[3])} км².`});
  });
  for (let i=0;i<50;i++){
    const four=rnd(LKES,4), sh=[...four].sort(()=>Math.random()-.5);
    const w=[...four].sort((a,b)=>b[3]-a[3])[0], wi=sh.indexOf(w);
    bank.push({cat:"Озёра",diff:"medium",
      q:"Какое из этих озёр самое большое по площади?",
      opts:sh.map(l=>l[0]),a:wi,
      fact:`${w[0]} — ${fmtN(w[3])} км², самое большое.`});
  }

  // ── ОСТРОВА ──────────────────────────────────────────────────────────
  const oceans=["Тихий океан","Атлантический океан","Индийский океан","Северный Ледовитый океан","Средиземное море","Карибское море"];
  ISLS.forEach(i=>{
    const wn=rnde(names,[i[1]],3);
    if (wn.length===3) bank.push({cat:"Острова",diff:i[3],
      q:`Кому принадлежит ${i[0]}?`,opts:[i[1],...wn],a:0,
      fact:`${i[0]} принадлежит ${i[1]}.`});
    const wo=rnde(oceans,[i[2]],3);
    if (wo.length===3) bank.push({cat:"Острова",diff:i[3],
      q:`В каком океане/море расположен ${i[0]}?`,opts:[i[2],...wo],a:0,
      fact:`${i[0]} — ${i[2]}.`});
  });

  // ── ПУСТЫНИ ──────────────────────────────────────────────────────────
  const allContsD=[...CONTS,"Антарктида"];
  DSRT.forEach(d=>{
    const wc=rnde(allContsD,[d[1]],3);
    if (wc.length===3) bank.push({cat:"Пустыни",diff:d[4],
      q:`На каком континенте находится пустыня ${d[0]}?`,opts:[d[1],...wc],a:0,
      fact:`${d[0]} — ${d[3]} пустыня в ${d[1]}, ~${fmtN(d[2])} км².`});
  });
  for (let i=0;i<40;i++){
    const four=rnd(DSRT,4), sh=[...four].sort(()=>Math.random()-.5);
    const w=[...four].sort((a,b)=>b[2]-a[2])[0], wi=sh.indexOf(w);
    bank.push({cat:"Пустыни",diff:"hard",
      q:"Какая из этих пустынь самая большая по площади?",
      opts:sh.map(d=>d[0]),a:wi,
      fact:`${w[0]} — ~${fmtN(w[2])} км², самая большая.`});
  }

  // ── ХАРДКОДНЫЕ ──────────────────────────────────────────────────────
  bank.push(...FIXED);
  return bank;
}

// ══════════════════════════════════════════════════════════════════════════
//  ЧЕРЕДОВАНИЕ КАТЕГОРИЙ
// ══════════════════════════════════════════════════════════════════════════
function buildRotatedPool(bank) {
  const byCat = {};
  CAT_ORDER.forEach(c => byCat[c] = []);
  bank.forEach(q => { if (byCat[q.cat]) byCat[q.cat].push(q); });
  CAT_ORDER.forEach(c => byCat[c].sort(() => Math.random()-.5));

  const picked = [];
  let ci = 0;
  while (picked.length < GAME_SIZE) {
    let added = false;
    for (let t = 0; t < CAT_ORDER.length; t++) {
      const cat = CAT_ORDER[(ci+t) % CAT_ORDER.length];
      if (byCat[cat] && byCat[cat].length > 0) {
        picked.push(byCat[cat].pop());
        ci = (CAT_ORDER.indexOf(cat)+1) % CAT_ORDER.length;
        added = true;
        break;
      }
    }
    if (!added) break;
  }
  return picked.reverse(); // reverse: pop() даёт вопросы в порядке категорий
}

// ══════════════════════════════════════════════════════════════════════════
//  ИГРОВАЯ ЛОГИКА
// ══════════════════════════════════════════════════════════════════════════
const GAME_SIZE = 50;
let pool=[], current=null, answered=false;
let correct=0, wrong=0, streak=0, bestStreak=0, bankSize=0;

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('banner').classList.add('on');});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;closeBanner();});}
function closeBanner(){document.getElementById('banner').classList.remove('on');}
if('serviceWorker'in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Shake detection
let lx=null,ly=null,lz=null,shLock=null;
function enableMotion(){
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);}).catch(()=>{});
  }else{window.addEventListener('devicemotion',onMotion);}
}
function onMotion(e){
  const a=e.accelerationIncludingGravity;if(!a)return;
  const {x,y,z}=a;
  if(lx===null){lx=x;ly=y;lz=z;return;}
  const d=Math.abs(x-lx)+Math.abs(y-ly)+Math.abs(z-lz);
  lx=x;ly=y;lz=z;
  if(d>17&&!shLock){shLock=setTimeout(()=>shLock=null,1000);handleBtn();}
}
document.getElementById('cupWrap').addEventListener('click',enableMotion,{once:true});
const vib=p=>{if('vibrate'in navigator)navigator.vibrate(p);};

function initPool(){
  const bank=buildBank();
  bankSize=bank.length;
  document.getElementById('bankBadge').textContent=`📚 ${fmtN(bankSize)} вопросов`;
  pool=buildRotatedPool(bank);
}

function restart(){
  correct=wrong=streak=bestStreak=0;
  answered=false;current=null;
  initPool();updateUI();
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('empty').style.display='block';
  document.getElementById('qc').style.display='none';
  setBtn('🎰 Потрясти!',false);
  document.getElementById('hint').textContent='Нажми на кубик или потряси телефон!';
  document.getElementById('catInd').textContent='🎲 Потряси, чтобы начать!';
}

function updateUI(){
  document.getElementById('sv0').textContent=correct;
  document.getElementById('sv1').textContent=wrong;
  document.getElementById('sv2').textContent=streak;
  const done=GAME_SIZE-pool.length;
  const pct=Math.round(done/GAME_SIZE*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('plbl1').textContent=`${done} / ${GAME_SIZE}`;
  document.getElementById('plbl2').textContent=pct+'%';
}
function setBtn(txt,dis){const b=document.getElementById('mbtn');b.textContent=txt;b.disabled=dis;}

function handleBtn(){
  const btn=document.getElementById('mbtn');
  if(btn.disabled)return;
  if(answered){
    if(pool.length===0){showResults();return;}
    answered=false;doShake();
  }else{
    if(pool.length===0){showResults();return;}
    doShake();
  }
}

function doShake(){
  const cup=document.getElementById('cup'), ring=document.getElementById('ring');
  setBtn('🎰 Потрясти!',true);
  vib([25,15,40]);
  cup.classList.remove('sh');ring.classList.remove('pulse');
  void cup.offsetWidth;
  cup.classList.add('sh');ring.classList.add('pulse');
  setTimeout(()=>{
    cup.classList.remove('sh');ring.classList.remove('pulse');
    showQuestion();
    setBtn('🎰 Потрясти!',false);
  },800);
}

// Иконки категорий
const CAT_ICONS={
  "Столицы":"🏛️","Континенты":"🗺️","Рекорды":"🏆","Население":"👥",
  "Горы":"⛰️","Реки":"🌊","Озёра":"💧","Острова":"🏝️",
  "Пустыни":"🏜️","Флаги":"🚩","Природа":"🌿","Города":"🏙️","Политика":"⚖️"
};

function showQuestion(){
  current=pool.pop();
  answered=false;
  updateUI();

  // Обновляем индикатор категории
  const icon=CAT_ICONS[current.cat]||'🌍';
  document.getElementById('catInd').textContent=`${icon} Категория: ${current.cat}`;

  document.getElementById('empty').style.display='none';
  document.getElementById('qc').style.display='block';
  document.getElementById('fb').className='fb';
  document.getElementById('fb').textContent='';
  document.getElementById('hint').textContent='↑ Потряси для следующего вопроса';

  document.getElementById('qcat').textContent=icon+' '+current.cat;
  const de=document.getElementById('qdiff');
  const dm={easy:['easy','⭐ Лёгкий'],medium:['medium','⭐⭐ Средний'],hard:['hard','⭐⭐⭐ Сложный']};
  de.className='dtag '+dm[current.diff][0];
  de.textContent=dm[current.diff][1];
  document.getElementById('qtext').textContent=current.q;

  // Перетасовываем варианты, сохраняя правильный ответ
  const origOpts=[...current.opts];
  const sh=[...origOpts].sort(()=>Math.random()-.5);
  const correctText=current.opts[current.a];
  const newA=sh.indexOf(correctText);

  const og=document.getElementById('opts');
  og.innerHTML='';
  sh.forEach((txt,idx)=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=txt;b.dataset.i=idx;
    b.onclick=()=>pick(b,idx,newA);
    og.appendChild(b);
  });

  const card=document.getElementById('card');
  card.className='card new';
  setTimeout(()=>card.className='card',400);
  document.querySelector('.card-wrap').scrollTop=0;
}

function pick(btn,idx,correctIdx){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok=idx===correctIdx;
  const fb=document.getElementById('fb');
  if(ok){
    btn.classList.add('ok');
    correct++;streak++;
    if(streak>bestStreak)bestStreak=streak;
    fb.className='fb ok on';
    fb.textContent='✅ '+current.fact;
    vib([40,20,70]);
    if(streak>=3){showBadge('🔥 Серия × '+streak+'!');confetti();}
  }else{
    btn.classList.add('no');
    wrong++;streak=0;
    fb.className='fb no on';
    fb.textContent='❌ Верно: «'+current.opts[current.a]+'». '+current.fact;
    vib([90,40,90]);
    document.querySelectorAll('.opt').forEach(b=>{if(+b.dataset.i===correctIdx)b.classList.add('ok');});
  }
  updateUI();
  setBtn(pool.length===0?'🏆 Результаты':'➡️ Следующий вопрос',false);
}

function showBadge(txt){
  const b=document.getElementById('sbadge');
  b.textContent=txt;b.className='sbadge';
  void b.offsetWidth;b.className='sbadge pop';
}

function showResults(){
  const tot=correct+wrong;
  const pct=tot?Math.round(correct/tot*100):0;
  const score=Math.max(0,correct*10-wrong*3);
  let e='😅',t='Не сдавайся!';
  if(pct>=90){e='🏆';t='Ты — гений географии!';}
  else if(pct>=75){e='🥇';t='Отличный результат!';}
  else if(pct>=60){e='🌍';t='Хорошая работа!';}
  else if(pct>=40){e='🗺️';t='Есть куда расти!';}
  document.getElementById('re').textContent=e;
  document.getElementById('rt').textContent=t;
  document.getElementById('rs').textContent=`Пройдено: ${tot} вопросов из ${GAME_SIZE}`;
  document.getElementById('rscore').textContent=score;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rbest').textContent=bestStreak;
  document.getElementById('overlay').classList.add('on');
  if(pct>=60){vib([50,30,50,30,100]);confetti(50);}
}

function confetti(n=22){
  const cl=['#ffd166','#4dffb0','#ff6b6b','#aad4f5','#f7971e','#fff','#c77dff'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='conf';
      el.style.cssText=`left:${Math.random()*100}vw;top:-12px;`+
        `width:${Math.random()*8+5}px;height:${Math.random()*8+5}px;`+
        `background:${cl[Math.floor(Math.random()*cl.length)]};`+
        `animation-duration:${Math.random()*2+1.5}s;`+
        `animation-delay:${Math.random()*.4}s;`+
        `border-radius:${Math.random()>.5?'50%':'3px'};`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3200);
    },i*55);
  }
}

document.addEventListener('touchmove',e=>{if(e.touches.length===1)e.preventDefault();},{passive:false});
initPool();
updateUI();
</script>
