<title>🌍 Шейкер Квиз — География</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
@keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); background-size: 400% 400%; animation: gradientShift 15s ease infinite; min-height: 100vh; color: #fff; overflow-x: hidden; }
.app-container { max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; }
.header { text-align: center; padding: 16px 0 10px; }

.header .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }
.menu-card, .question-card, .results-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.12); border-radius: 22px; padding: 24px 20px; margin-top: 16px; text-align: center; }
.menu-icon { font-size: 64px; display: block; margin-bottom: 12px; animation: pulse 2s infinite; }
.menu-card h2 { font-size: 20px; margin-bottom: 6px; }
.menu-card p { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
.stats-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
.stat-box { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 10px 14px; min-width: 80px; }
.stat-box .stat-num { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-box .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.btn-primary, .btn-secondary { width: 100%; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.2s; margin-top: 8px; }
.btn-primary { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; box-shadow: 0 6px 20px rgba(245,87,108,0.3); }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
.btn-primary:active, .btn-secondary:active { transform: scale(0.97); }
.quiz-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 12px; font-size: 13px; }
.quiz-progress { font-weight: 600; color: rgba(255,255,255,0.7); }
.quiz-score { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px 10px; font-weight: 700; }
.quiz-score span { color: #ffd200; }
.progress-bar-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #f093fb, #f5576c, #ffd200); transition: width 0.4s ease; }
.category-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 16px; padding: 5px 12px; font-size: 11px; font-weight: 600; margin-bottom: 14px; }
.question-number { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px; font-weight: 600; text-align: left; }
.question-text { font-size: 18px; font-weight: 700; line-height: 1.45; margin-bottom: 16px; text-align: left; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; transition: all 0.25s ease; }
.option-btn .option-letter { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
.option-btn:active { transform: scale(0.985); }
.option-btn.correct { background: rgba(46, 213, 115, 0.25); border-color: #2ed573; animation: bounceIn 0.4s ease; }
.option-btn.correct .option-letter { background: #2ed573; color: #fff; }
.option-btn.wrong { background: rgba(255, 71, 87, 0.25); border-color: #ff4757; animation: shake 0.4s ease; }
.option-btn.wrong .option-letter { background: #ff4757; color: #fff; }
.option-btn.disabled { pointer-events: none; opacity: 0.6; }
.option-btn.disabled.correct, .option-btn.disabled.wrong { opacity: 1; }
.comment-box { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 16px; margin-top: 16px; animation: fadeIn 0.35s ease; font-size: 14px; line-height: 1.55; color: rgba(255,255,255,0.9); border-left: 4px solid; }

.results-emoji { font-size: 72px; display: block; margin-bottom: 12px; animation: bounceIn 0.7s ease; }

.results-bars { display: flex; justify-content: center; gap: 20px; margin-bottom: 22px; }

.result-bar-item .rb-num { font-size: 26px; font-weight: 800; }

.rb-correct .rb-num { color: #2ed573; }
.rb-wrong .rb-num { color: #ff4757; }
.confetti-piece { position: fixed; width: 8px; height: 8px; top: 100%; z-index: 999; pointer-events: none; animation: confetti 1.2s ease forwards; }
@supports (padding-bottom: env(safe-area-inset-bottom)) { .app-container { padding-bottom: calc(16px + env(safe-area-inset-bottom)); } }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>🌍 Шейкер Квиз</h1>
    <div class="subtitle">География • 13 категорий • Без повторов</div>
  </div>

  <div id="screen-menu" class="screen active">
    <div class="menu-card">
      <span class="menu-icon">🧠</span>
      <h2>Готов тряхнуть знаниями?</h2>

      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="total-played">0</div><div class="stat-label">Игр сыграно</div></div>
        <div class="stat-box"><div class="stat-num" id="total-answered">0</div><div class="stat-label">Вопросов пройдено</div></div>
        <div class="stat-box"><div class="stat-num" id="total-available">500+</div><div class="stat-label">Осталось</div></div>
      </div>
      <button class="btn-primary" onclick="startGame()">🎮 Начать игру</button>
      <button class="btn-secondary" onclick="resetProgress()">🗑 Сбросить прогресс</button>
    </div>
  </div>

  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-progress" id="quiz-progress">1 / 50</div>
      <div class="quiz-score">⭐ <span id="live-score">0</span></div>
    </div>
    <div class="progress-bar-container"><div class="progress-bar-fill" id="progress-fill" style="width: 2%"></div></div>
    <div class="category-badge" id="category-badge">📍 Столицы</div>
    <div class="question-card" id="question-card">
      <div class="question-number" id="question-number">Вопрос 1 из 50</div>
      <div class="question-text" id="question-text">Загрузка...</div>
    </div>
    <div class="options-list" id="options-list"></div>
    <div id="comment-area"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Следующий вопрос →</button>
  </div>

  <div id="screen-results" class="screen">
    <div class="results-card">
      <span class="results-emoji" id="results-emoji">🏆</span>
      <h2 id="results-title">Отлично!</h2>
      <div class="results-subtitle" id="results-subtitle"></div>
      <div class="results-score-big" id="results-score-big">0/50</div>
      <div class="results-detail" id="results-detail"></div>
      <div class="results-bars">
        <div class="result-bar-item rb-correct"><div class="rb-num" id="res-correct">0</div><div class="rb-label">Верно</div></div>
        <div class="result-bar-item rb-wrong"><div class="rb-num" id="res-wrong">0</div><div class="rb-label">Неверно</div></div>
      </div>
      <button class="btn-primary" onclick="startGame()">🔄 Ещё разок!</button>
      <button class="btn-secondary" onclick="showMenu()">🏠 В меню</button>
    </div>
  </div>
</div>

["Какая страна самая большая на Карибах?","Куба","Доминикана","Гаити","Ямайка"],
["Какая страна имеет больше всего соседей в Европе?","Германия","Франция","Австрия","Россия"],
["Какая страна самая плоская?","Мальдивы","Катар","Кувейт","Бахрейн"],
["Какая страна самая узкая?","Чили","Норвегия","Вьетнам","Палестина"],
["Какая страна имеет больше всего озёр?","Канада","Финляндия","Россия","Швеция"],
["Какая страна не входит ни в один континент?","Островные государства","Все страны на континентах","Антарктида","Нет такой"]
]
};

let gameState = {
  usedIds: new Set(),
  currentQuestions: [],
  currentIndex: 0,
  score: 0,
  correctCount: 0,
  wrongCount: 0,
  gameStarted: false,
  answered: false
};

function loadUsedIds() {
  try {
    const saved = localStorage.getItem('shaker_quiz_used_ids');
    if (saved) gameState.usedIds = new Set(JSON.parse(saved));
  } catch(e) { gameState.usedIds = new Set(); }
}

function saveUsedIds() {
  try {
    localStorage.setItem('shaker_quiz_used_ids', JSON.stringify([...gameState.usedIds]));
  } catch(e) {}
}

function getQuestionId(cat, index) { return cat + '_' + index; }

function getUnusedQuestions(cat) {
  const questions = ALL_QUESTIONS[cat] || [];
  const unused = [];
  questions.forEach((q, i) => {
    const id = getQuestionId(cat, i);
    if (!gameState.usedIds.has(id)) {
      unused.push({ question: q[0], answer: q[1], options: [q[1], q[2], q[3], q[4]], cat: cat, id: id });
    }
  });
  return unused;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectQuestions() {
  let selected = [];
  const basePerCat = Math.floor(TOTAL_QUESTIONS_PER_GAME / CATEGORIES.length);
  let extraNeeded = TOTAL_QUESTIONS_PER_GAME - basePerCat * CATEGORIES.length;

  for (let cat of CATEGORIES) {
    const unused = getUnusedQuestions(cat);
    if (unused.length === 0) continue;
    const count = basePerCat + (extraNeeded > 0 ? 1 : 0);
    const shuffled = shuffleArray(unused);
    const toPick = shuffled.slice(0, Math.min(count, shuffled.length));
    selected.push(...toPick);
    if (extraNeeded > 0) extraNeeded--;
  }

  while (selected.length < TOTAL_QUESTIONS_PER_GAME) {
    const availableCats = CATEGORIES.filter(c => getUnusedQuestions(c).length > 0);
    if (availableCats.length === 0) break;
    const cat = availableCats[Math.floor(Math.random() * availableCats.length)];
    const unused = getUnusedQuestions(cat);
    selected.push(unused[Math.floor(Math.random() * unused.length)]);
  }

  return shuffleArray(selected);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;z-index:1000;transition:transform 0.3s;white-space:nowrap;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(-100px)'; setTimeout(() => toast.remove(), 300); }, 2500);
}

function updateMenuStats() {
  let total = 0;
  for (let cat of CATEGORIES) total += (ALL_QUESTIONS[cat] || []).length;
  const used = gameState.usedIds.size;
  const available = Math.max(0, total - used);
  document.getElementById('total-played').textContent = Math.floor(used / TOTAL_QUESTIONS_PER_GAME);
  document.getElementById('total-answered').textContent = used;
  document.getElementById('total-available').textContent = available + '+';
}

function showMenu() {
  updateMenuStats();
  showScreen('screen-menu');
}

function startGame() {
  const total = CATEGORIES.reduce((s,c)=>s+(ALL_QUESTIONS[c]||[]).length, 0);
  const used = gameState.usedIds.size;
  if (total - used < TOTAL_QUESTIONS_PER_GAME) {
    showToast('⚠️ Все вопросы использованы! Сбросьте прогресс.');
    return;
  }

  gameState.currentQuestions = selectQuestions();
  gameState.currentIndex = 0;
  gameState.score = 0;
  gameState.correctCount = 0;
  gameState.wrongCount = 0;
  gameState.gameStarted = true;
  gameState.answered = false;

  gameState.currentQuestions.forEach(q => gameState.usedIds.add(q.id));
  saveUsedIds();

  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = gameState.currentQuestions[gameState.currentIndex];
  const idx = gameState.currentIndex;
  const total = gameState.currentQuestions.length;

  document.getElementById('quiz-progress').textContent = `${idx + 1} / ${total}`;
  document.getElementById('live-score').textContent = gameState.score;
  document.getElementById('progress-fill').style.width = `${((idx + 1) / total) * 100}%`;

  const emoji = CAT_EMOJIS[q.cat] || '📍';
  document.getElementById('category-badge').innerHTML = `${emoji} ${q.cat}`;
  document.getElementById('question-number').textContent = `Вопрос ${idx + 1} из ${total}`;
  document.getElementById('question-text').textContent = q.question;

  const shuffledOptions = shuffleArray(q.options);
  const letters = ['A', 'B', 'C', 'D'];
  const optionsHtml = shuffledOptions.map((opt, i) => `
    <button class="option-btn" data-selected="${opt}" data-correct="${q.answer}">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  document.getElementById('options-list').innerHTML = optionsHtml;
  document.getElementById('comment-area').innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
  gameState.answered = false;

  document.getElementById('question-card').style.animation = 'none';
  setTimeout(() => document.getElementById('question-card').style.animation = 'slideIn 0.3s ease', 10);
}

document.getElementById('options-list').addEventListener('click', (e) => {
  const btn = e.target.closest('.option-btn');
  if (!btn || gameState.answered) return;

  gameState.answered = true;
  const selected = btn.dataset.selected;
  const correct = btn.dataset.correct;
  const isCorrect = selected === correct;

  // Найти кнопку с правильным ответом
  const correctBtn = [...document.querySelectorAll('.option-btn')].find(b => b.dataset.correct === correct);
  
  // Отключить все кнопки
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.add('disabled');
    // Если это правильный ответ — подсветить зелёным
    if (b.dataset.correct === correct) {
      b.classList.add('correct');
    }
  });
  
  // Если игрок выбрал неверно — его кнопка красная
  if (!isCorrect) {
    btn.classList.add('wrong');
  }

  // Обновить счёт
  if (isCorrect) { gameState.score++; gameState.correctCount++; }
  else { gameState.wrongCount++; }
  document.getElementById('live-score').textContent = gameState.score;

  // Показать комментарий с фактом
  const fact = getFact(correct);
  const commentPool = isCorrect ? correctComments : wrongComments;
  const joke = commentPool[Math.floor(Math.random() * commentPool.length)];
  const commentClass = isCorrect ? 'correct-comment' : 'wrong-comment';
  
  document.getElementById('comment-area').innerHTML = `
    <div class="comment-box ${commentClass}">
      <div class="comment-title">
        ${isCorrect ? '✅ Верно!' : '❌ Неверно. Правильный ответ: ' + correct}
      </div>
      <div class="comment-text">${fact}</div>
      ${!isCorrect ? `<div style="margin-top:6px;font-size:12px;opacity:0.8">💡 ${joke}</div>` : ''}
    </div>
  `;
  
  document.getElementById('next-btn').style.display = 'block';
});

function nextQuestion() {
  gameState.currentIndex++;
  if (gameState.currentIndex >= gameState.currentQuestions.length) {
    endGame();
    return;
  }
  renderQuestion();
}

function endGame() {
  const total = gameState.currentQuestions.length;
  const pct = Math.round((gameState.score / total) * 100);
  let emoji, title, subtitle;
  if (pct >= 90) { emoji='🏆'; title='Невероятно!'; subtitle='Ты настоящий географ!'; }
  else if (pct >= 70) { emoji='🌟'; title='Отлично!'; subtitle='Знания на высоте!'; }
  else if (pct >= 50) { emoji='😊'; title='Неплохо!'; subtitle='Есть куда расти!'; }
  else if (pct >= 30) { emoji='🤔'; title='Можно лучше!'; subtitle='Почитай атлас на досуге!'; }
  else { emoji='📚'; title='Время учиться!'; subtitle='География ждёт тебя!'; }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = subtitle;
  document.getElementById('results-score-big').textContent = `${gameState.score}/${total}`;
  document.getElementById('results-detail').textContent = `Точность: ${pct}%`;
  document.getElementById('res-correct').textContent = gameState.correctCount;
  document.getElementById('res-wrong').textContent = gameState.wrongCount;

  showScreen('screen-results');
  if (pct >= 70) launchConfetti();
}

function launchConfetti() {
  const colors = ['#f5576c','#ffd200','#43e97b','#4facfe','#f093fb','#fa709a'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.width = (Math.random() * 6 + 6) + 'px';
      piece.style.height = (Math.random() * 6 + 6) + 'px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 1500);
    }, i * 40);
  }
}

function resetProgress() {
  if (confirm('Сбросить весь прогресс? Все вопросы снова станут доступны.')) {
    gameState.usedIds = new Set();
    saveUsedIds();
    updateMenuStats();
    showToast('🗑 Прогресс сброшен!');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  loadUsedIds();
  updateMenuStats();
});
document.addEventListener('dblclick', e => e.preventDefault());
</script>
